<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Me a Book</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>Find Me a Book</h1>
        <p>Search and filter books by genre, age range, and content profile.</p>
      </header>

      <main class="app-main" aria-label="Book discovery layout">
        <aside class="filters-panel" aria-label="Filter controls">
          <h2>Filters</h2>
          <div class="filter-group">
            <label for="filter-genre">Genre</label>
            <select id="filter-genre" disabled>
              <option>Coming soon</option>
            </select>
          </div>
          <div class="filter-group filter-row">
            <div>
              <label for="filter-age-min">Age Min</label>
              <input id="filter-age-min" type="number" min="0" max="120" disabled />
            </div>
            <div>
              <label for="filter-age-max">Age Max</label>
              <input id="filter-age-max" type="number" min="0" max="120" disabled />
            </div>
          </div>
          <div class="filter-group">
            <label for="filter-spice">Spice Level</label>
            <select id="filter-spice" disabled>
              <option>Coming soon</option>
            </select>
          </div>
        </aside>

        <section class="results-panel" aria-label="Search and results">
          <form id="search-form" class="search-bar" role="search">
            <label class="sr-only" for="search-input">Search books</label>
            <input
              id="search-input"
              name="q"
              type="search"
              placeholder="Search by title, author, or topic"
              autocomplete="off"
            />
            <button type="submit">Search</button>
          </form>

          <section class="results-region" aria-live="polite">
            <h2>Results</h2>
            <p id="results-status" class="results-status">
              Enter a query to load matching books.
            </p>
            <ul id="results-list" class="results-list"></ul>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
